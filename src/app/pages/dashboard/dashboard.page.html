<ion-header>
  <ion-toolbar>
    <ion-title>Dashboard</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Welcome</ion-card-title>
      <ion-card-subtitle
        >{{ user.displayName }} ({{ user.username }})</ion-card-subtitle
      >
    </ion-card-header>
    <ion-card-content>
      <ion-button expand="block" (click)="logout()">Sign out</ion-button>
      <ion-button expand="block" fill="clear" [routerLink]="ROUTE_URL_HOME"
        >Home</ion-button
      >
    </ion-card-content>
  </ion-card>
</ion-content>
