<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Sign in</ion-card-title>
      <ion-card-subtitle
        >Use mock credentials to access the app.</ion-card-subtitle
      >
    </ion-card-header>
    <ion-card-content>
      <form (ngSubmit)="onSubmit()">
        <ion-item>
          <ion-label position="stacked" for="username">Username</ion-label>
          <ion-input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="e.g. demo"
            autocomplete="username"
          />
        </ion-item>
        <ion-item>
          <ion-label position="stacked" for="password">Password</ion-label>
          <ion-input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="e.g. demo"
            autocomplete="current-password"
          />
        </ion-item>
        @if (error) {
          <ion-note color="danger" class="ion-padding-start">{{ error }}</ion-note>
        }
        <ion-button type="submit" expand="block" class="ion-margin-top"
          >Sign in</ion-button
        >
      </form>
      <p class="ion-margin-top ion-text-center ion-text-small">
        Mock users: <strong>demo / demo</strong>, <strong>admin / admin</strong>
      </p>
      <ion-button fill="clear" expand="block" [routerLink]="ROUTE_URL_HOME">
        Back to Home
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
